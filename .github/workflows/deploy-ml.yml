name: Deploy ML Service

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/deploy-ml.yml"

  workflow_dispatch:

concurrency:
  group: deploy-ml-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PROJECT_ID:   ${{ vars.GCP_PROJECT_ID }}
  REGION:       asia-southeast1
  SERVICE_NAME: pawsport-backend-ml
  IMAGE:        asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pawsport/ml:${{ github.sha }}

jobs:
  build:
    name: Build ML Image
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          lfs: true

      - name: Authenticate to GCP
        # google-github-actions/auth v2.1.7
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        # google-github-actions/setup-gcloud v2.1.4
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build ML image via Cloud Build
        run: |
          gcloud builds submit \
            --config=ml/cloudbuild.yaml \
            --substitutions="_IMAGE=${{ env.IMAGE }}" \
            --timeout=1800s \
            --machine-type=e2-highcpu-32 \
            --suppress-logs \
            ./ml

  deploy:
    name: Deploy ML Service
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get current stable revision
        id: current
        run: |
          REV=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format=json 2>/dev/null \
            | jq -r '
                .status.traffic[]
                | select(.percent == 100)
                | .revisionName
              ' || echo "")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"

      - name: Deploy ML revision
        run: |
          SERVICE_EXISTS=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" --quiet 2>/dev/null && echo "yes" || echo "no")
          NO_TRAFFIC_FLAG=""
          [[ "$SERVICE_EXISTS" == "yes" ]] && NO_TRAFFIC_FLAG="--no-traffic"

          gcloud run deploy "$SERVICE_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --ingress=all \
            --min-instances=0 \
            --max-instances=5 \
            --cpu=2 \
            --memory=4Gi \
            --timeout=300 \
            $NO_TRAFFIC_FLAG \
            --tag="candidate" \
            --labels="git-sha=${GITHUB_SHA::12},managed-by=github-actions"

      - name: Get new revision name
        id: new_revision
        run: |
          REV=$(gcloud run revisions list \
            --service="$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r 'sort_by(.metadata.creationTimestamp) | last | .metadata.name')
          echo "name=${REV}" >> "$GITHUB_OUTPUT"

      - name: Health check (pre-traffic)
        id: healthcheck
        run: |
          REVISION_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r '.status.traffic[] | select(.tag == "candidate") | .url' 2>/dev/null || echo "")

          if [[ -z "$REVISION_URL" ]]; then
            echo "Warning: could not get candidate tag URL, falling back to service URL"
            REVISION_URL=$(gcloud run services describe "$SERVICE_NAME" \
              --region="$REGION" \
              --format="value(status.url)")
          fi

          echo "Probing ${REVISION_URL}/health ..."

          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -sf \
              --max-time 30 \
              -o /dev/null \
              -w "%{http_code}" \
              "${REVISION_URL}/health" 2>/dev/null || echo "000")

            echo "  Attempt ${i}/12 → HTTP ${HTTP_STATUS}"

            if [[ "$HTTP_STATUS" == "200" ]]; then
              echo "passed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 15
          done

          echo "passed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.current.outputs.revision != ''
        run: |
          echo "::error::Health check failed — rolling back to ${{ steps.current.outputs.revision }}"
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region="$REGION" \
            --to-revisions="${{ steps.current.outputs.revision }}=100"
          echo "### ⏪ ML rolled back to \`${{ steps.current.outputs.revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Migrate traffic
        run: |
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region="$REGION" \
            --to-revisions="${{ steps.new_revision.outputs.name }}=100"

      - name: Prune old revisions (keep 3)
        run: |
          mapfile -t OLD < <(gcloud run revisions list \
            --service="$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r 'sort_by(.metadata.creationTimestamp) | reverse | .[3:] | .[].metadata.name')

          for rev in "${OLD[@]}"; do
            gcloud run revisions delete "$rev" --region="$REGION" --quiet
          done

      - name: Summary
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" --format="value(status.url)")
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### ✅ ML Service Deployed
          | | |
          |---|---|
          | **Revision** | \`${{ steps.new_revision.outputs.name }}\` |
          | **URL** | ${URL} |
          | **Commit** | \`${GITHUB_SHA::12}\` |
          EOF
