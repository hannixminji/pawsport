name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  PROJECT_ID:   ${{ vars.GCP_PROJECT_ID }}
  REGION:       asia-southeast1
  SERVICE_NAME: pawsport-backend
  IMAGE:        asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pawsport/backend:${{ github.sha }}
  CACHE_IMAGE:  asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/pawsport/backend:cache

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Authenticate to GCP
        # google-github-actions/auth v2.1.7
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        # google-github-actions/setup-gcloud v2.1.4
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${{ env.IMAGE }},_CACHE_IMAGE=${{ env.CACHE_IMAGE }}" \
            --timeout=1200s \
            --machine-type=e2-highcpu-8 \
            --suppress-logs \
            .

  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'staging' }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Sync secrets to Secret Manager
        env:
          POSTGRES_URL:                  ${{ secrets.POSTGRES_URL }}
          REDIS_CACHE_URL:               ${{ secrets.REDIS_CACHE_URL }}
          QDRANT_CLOUD_URL:              ${{ secrets.QDRANT_CLOUD_URL }}
          QDRANT_CLOUD_API_KEY:          ${{ secrets.QDRANT_CLOUD_API_KEY }}
          BREVO_API_KEY:                 ${{ secrets.BREVO_API_KEY }}
          ADMIN_SESSION_SIGNING_SECRET:  ${{ secrets.ADMIN_SESSION_SIGNING_SECRET }}
          SECRET_KEY:                    ${{ secrets.SECRET_KEY }}
          ADMIN_EMAIL:                   ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME:                ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD:                ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sync_secret() {
            local name="$1"
            local value="$2"
            local tmp
            tmp=$(mktemp)
            trap "rm -f '$tmp'" RETURN
            printf '%s' "$value" > "$tmp"

            if ! gcloud secrets describe "$name" --quiet 2>/dev/null; then
              echo "  Creating secret: $name"
              gcloud secrets create "$name" \
                --replication-policy=automatic \
                --data-file="$tmp" \
                --quiet
              return
            fi

            local latest_version
            latest_version=$(gcloud secrets versions list "$name" \
              --filter="state=ENABLED" \
              --sort-by="~createTime" \
              --limit=1 \
              --format="value(name)" 2>/dev/null || echo "")

            if [[ -n "$latest_version" ]]; then
              local current_hash new_hash
              current_hash=$(gcloud secrets versions access "$latest_version" \
                --format="get(payload.data)" 2>/dev/null \
                | base64 --decode \
                | sha256sum | cut -d' ' -f1)
              new_hash=$(sha256sum < "$tmp" | cut -d' ' -f1)
              if [[ "$current_hash" == "$new_hash" ]]; then
                echo "  Skipping $name (unchanged)"
                return
              fi
            fi

            echo "  Updating secret: $name"
            gcloud secrets versions add "$name" --data-file="$tmp" --quiet
          }

          sync_secret "POSTGRES_URL"                 "$POSTGRES_URL"
          sync_secret "REDIS_CACHE_URL"              "$REDIS_CACHE_URL"
          sync_secret "QDRANT_CLOUD_URL"             "$QDRANT_CLOUD_URL"
          sync_secret "QDRANT_CLOUD_API_KEY"         "$QDRANT_CLOUD_API_KEY"
          sync_secret "BREVO_API_KEY"                "$BREVO_API_KEY"
          sync_secret "ADMIN_SESSION_SIGNING_SECRET" "$ADMIN_SESSION_SIGNING_SECRET"
          sync_secret "SECRET_KEY"                   "$SECRET_KEY"
          sync_secret "ADMIN_EMAIL"                  "$ADMIN_EMAIL"
          sync_secret "ADMIN_USERNAME"               "$ADMIN_USERNAME"
          sync_secret "ADMIN_PASSWORD"               "$ADMIN_PASSWORD"

      - name: Get current stable revision
        id: current
        run: |
          REV=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format=json 2>/dev/null \
            | jq -r '
                .status.traffic[]
                | select(.percent == 100)
                | .revisionName
              ' || echo "")
          echo "revision=${REV}" >> "$GITHUB_OUTPUT"
          echo "Current stable revision: ${REV:-none}"

      - name: Get service URL
        id: service
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format="value(status.url)" 2>/dev/null || echo "")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Get ML service URL
        id: ml
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}-ml" \
            --region="$REGION" \
            --format="value(status.url)" 2>/dev/null || echo "")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy new revision
        run: |
          if [[ "$ENVIRONMENT" == "production" ]]; then
            AUTHED_FLAG="--allow-unauthenticated"
            MIN_INST=1
            MAX_INST=10
            MEMORY="1Gi"
            CPU="2"
          else
            AUTHED_FLAG="--allow-unauthenticated"
            MIN_INST=0
            MAX_INST=10
            MEMORY="512Mi"
            CPU="1"
          fi

          SERVICE_EXISTS=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" --quiet 2>/dev/null && echo "yes" || echo "no")
          NO_TRAFFIC_FLAG=""
          [[ "$SERVICE_EXISTS" == "yes" ]] && NO_TRAFFIC_FLAG="--no-traffic"

          SERVICE_URL="${{ steps.service.outputs.url }}"
          APP_URL="${SERVICE_URL:-https://pawsport-backend-zwfk6vsyea-as.a.run.app}"
          QR_BASE_URL="${APP_URL}/api/v1/pets/qr"
          COOKIE_SECURE="false"
          [[ "$ENVIRONMENT" == "production" ]] && COOKIE_SECURE="true"

          gcloud run deploy "$SERVICE_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --platform=managed \
            $AUTHED_FLAG \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --ingress=all \
            --min-instances="${MIN_INST}" \
            --max-instances="${MAX_INST}" \
            --concurrency=80 \
            --cpu="${CPU}" \
            --memory="${MEMORY}" \
            --timeout=60 \
            $NO_TRAFFIC_FLAG \
            --tag="candidate" \
            --set-env-vars="ENVIRONMENT=${ENVIRONMENT},ML_BASE_URL=${{ steps.ml.outputs.url }},APP_URL=${APP_URL},QR_BASE_URL=${QR_BASE_URL},BREVO_SENDER_EMAIL=${{ vars.BREVO_SENDER_EMAIL }},BREVO_SENDER_NAME=${{ vars.BREVO_SENDER_NAME }},GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }},ADMIN_SESSION_COOKIE_SECURE=${COOKIE_SECURE}" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,BREVO_API_KEY=BREVO_API_KEY:latest" \
            --labels="env=${ENVIRONMENT},git-sha=${GITHUB_SHA::12},git-branch=${GITHUB_REF_NAME},managed-by=github-actions"

      - name: Get new revision name
        id: new_revision
        run: |
          REV=$(gcloud run revisions list \
            --service="$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r 'sort_by(.metadata.creationTimestamp) | last | .metadata.name')
          echo "name=${REV}" >> "$GITHUB_OUTPUT"
          echo "New revision: $REV"

      - name: Health check (pre-traffic)
        id: healthcheck
        run: |
          REVISION_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r '.status.traffic[] | select(.tag == "candidate") | .url' 2>/dev/null || echo "")

          if [[ -z "$REVISION_URL" ]]; then
            echo "Warning: could not get candidate tag URL, falling back to service URL"
            REVISION_URL=$(gcloud run services describe "$SERVICE_NAME" \
              --region="$REGION" \
              --format="value(status.url)")
          fi

          echo "Probing ${REVISION_URL}/health ..."

          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -sf \
              --max-time 15 \
              --retry 0 \
              -o /dev/null \
              -w "%{http_code}" \
              "${REVISION_URL}/health" 2>/dev/null || echo "000")

            echo "  Attempt ${i}/10 → HTTP ${HTTP_STATUS}"

            if [[ "$HTTP_STATUS" == "200" ]]; then
              echo "passed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 10
          done

          echo "passed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.outputs.passed == 'false' && steps.current.outputs.revision != ''
        run: |
          echo "::error::Health check failed — rolling back to ${{ steps.current.outputs.revision }}"
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region="$REGION" \
            --to-revisions="${{ steps.current.outputs.revision }}=100"
          echo "### ⏪ Rolled back to \`${{ steps.current.outputs.revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Migrate traffic to new revision
        run: |
          gcloud run services update-traffic "$SERVICE_NAME" \
            --region="$REGION" \
            --to-revisions="${{ steps.new_revision.outputs.name }}=100"

      - name: Prune old revisions (keep current only)
        run: |
          mapfile -t OLD < <(gcloud run revisions list \
            --service="$SERVICE_NAME" \
            --region="$REGION" \
            --format=json \
            | jq -r 'sort_by(.metadata.creationTimestamp) | reverse | .[1:] | .[].metadata.name')

          for rev in "${OLD[@]}"; do
            echo "  Deleting $rev"
            gcloud run revisions delete "$rev" --region="$REGION" --quiet
          done

      - name: Prune old images from Artifact Registry (keep current only)
        run: |
          REPO="asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/pawsport"

          mapfile -t OLD_DIGESTS < <(
            gcloud artifacts docker images list "${REPO}/backend" \
              --include-tags \
              --sort-by="~UPDATE_TIME" \
              --format="value(version)" \
              --project="$PROJECT_ID" 2>/dev/null \
            | tail -n +2
          )

          for digest in "${OLD_DIGESTS[@]}"; do
            [[ -z "$digest" ]] && continue
            echo "  Deleting backend@${digest}"
            gcloud artifacts docker images delete \
              "${REPO}/backend@${digest}" \
              --delete-tags \
              --quiet \
              --project="$PROJECT_ID" 2>/dev/null || true
          done

      - name: Deployment summary
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format="value(status.url)")

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### ✅ Backend Deployment Complete

          | | |
          |---|---|
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Service** | \`${SERVICE_NAME}\` |
          | **Revision** | \`${{ steps.new_revision.outputs.name }}\` |
          | **Image** | \`${{ env.IMAGE }}\` |
          | **URL** | ${SERVICE_URL} |
          | **Commit** | \`${GITHUB_SHA::12}\` on \`${GITHUB_REF_NAME}\` |
          EOF

  migrate:
    name: Run Migrations
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Run Alembic migrations
        run: |
          JOB_NAME="${SERVICE_NAME}-migrate"

          gcloud run jobs create "$JOB_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest" \
            --command="alembic" \
            --args="upgrade,head" \
            --max-retries=1 \
            --task-timeout=120s \
            --quiet 2>/dev/null || \
          gcloud run jobs update "$JOB_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest" \
            --command="alembic" \
            --args="upgrade,head" \
            --max-retries=1 \
            --task-timeout=120s \
            --quiet

          gcloud run jobs execute "$JOB_NAME" \
            --region="$REGION" \
            --wait \
            --quiet

          echo "✅ Migrations complete" >> "$GITHUB_STEP_SUMMARY"

  seed:
    name: Run Seed / Bootstrap
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Run bootstrap
        run: |
          JOB_NAME="${SERVICE_NAME}-seed"

          gcloud run jobs create "$JOB_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_USERNAME=ADMIN_USERNAME:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest" \
            --command="python" \
            --args="-m,scripts.bootstrap" \
            --max-retries=1 \
            --task-timeout=120s \
            --quiet 2>/dev/null || \
          gcloud run jobs update "$JOB_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_USERNAME=ADMIN_USERNAME:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest" \
            --command="python" \
            --args="-m,scripts.bootstrap" \
            --max-retries=1 \
            --task-timeout=120s \
            --quiet

          gcloud run jobs execute "$JOB_NAME" \
            --region="$REGION" \
            --wait \
            --quiet

          echo "✅ Bootstrap/seed complete" >> "$GITHUB_STEP_SUMMARY"

  deploy-worker:
    name: Deploy Worker (${{ github.event.inputs.environment || 'staging' }})
    needs: seed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      WORKER_NAME: pawsport-backend-worker

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get ML service URL
        id: ml
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}-ml" \
            --region="$REGION" \
            --format="value(status.url)" 2>/dev/null || echo "")
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy worker revision
        run: |
          if [[ "$ENVIRONMENT" == "production" ]]; then
            MEMORY="1Gi"
            CPU="1"
          else
            MEMORY="512Mi"
            CPU="1"
          fi

          gcloud run deploy "$WORKER_NAME" \
            --image="${{ env.IMAGE }}" \
            --region="$REGION" \
            --platform=managed \
            --no-allow-unauthenticated \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --ingress=internal \
            --min-instances=1 \
            --max-instances=3 \
            --cpu="${CPU}" \
            --memory="${MEMORY}" \
            --timeout=3600 \
            --no-cpu-throttling \
            --command="python" \
            --args="-m,app.core.worker.entry" \
            --set-env-vars="ENVIRONMENT=${ENVIRONMENT},ML_BASE_URL=${{ steps.ml.outputs.url }},BREVO_SENDER_EMAIL=${{ vars.BREVO_SENDER_EMAIL }},BREVO_SENDER_NAME=${{ vars.BREVO_SENDER_NAME }},GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}" \
            --set-secrets="POSTGRES_URL=POSTGRES_URL:latest,REDIS_CACHE_URL=REDIS_CACHE_URL:latest,QDRANT_CLOUD_URL=QDRANT_CLOUD_URL:latest,QDRANT_CLOUD_API_KEY=QDRANT_CLOUD_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,ADMIN_SESSION_SIGNING_SECRET=ADMIN_SESSION_SIGNING_SECRET:latest,BREVO_API_KEY=BREVO_API_KEY:latest" \
            --labels="env=${ENVIRONMENT},git-sha=${GITHUB_SHA::12},git-branch=${GITHUB_REF_NAME},managed-by=github-actions"

      - name: Deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### ✅ Worker Deployment Complete

          | | |
          |---|---|
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Service** | \`${WORKER_NAME}\` |
          | **Image** | \`${{ env.IMAGE }}\` |
          | **Commit** | \`${GITHUB_SHA::12}\` on \`${GITHUB_REF_NAME}\` |
          EOF
