<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.4rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }

        input[type="password"]:focus {
            border-color: #4f46e5;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #4338ca; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset your password</h1>
        <p class="subtitle">Enter a new password for your account.</p>

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" placeholder="Enter new password" />

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" placeholder="Confirm new password" />

        <button id="submit-btn" onclick="submitReset()">Reset Password</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get("token");

        async function submitReset() {
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            const btn = document.getElementById("submit-btn");
            const msg = document.getElementById("message");

            msg.style.display = "none";

            if (!newPassword || !confirmPassword) {
                showMessage("Please fill in both fields.", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Resetting...";

            try {
                const response = await fetch("/api/v1/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, new_password: newPassword }),
                });

                if (response.ok) {
                    showMessage("Your password has been reset. You can now log in.", "success");
                    btn.style.display = "none";
                } else {
                    const data = await response.json().catch(() => ({}));
                    showMessage(data.detail || "Invalid or expired link. Please request a new one.", "error");
                    btn.disabled = false;
                    btn.textContent = "Reset Password";
                }
            } catch {
                showMessage("Something went wrong. Please try again.", "error");
                btn.disabled = false;
                btn.textContent = "Reset Password";
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = "message " + type;
            msg.style.display = "block";
        }
    </script>
</body>
</html>
