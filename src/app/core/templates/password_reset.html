    <meta name="viewport" content="width=device-width, initial-scale=1.0" style="box-sizing:border-box; margin:0; padding:0" />
    <title style="box-sizing:border-box; margin:0; padding:0">Reset Password · PawsPort</title>

    <!--
      Security headers are also set at the HTTP layer in the FastAPI route.
      The meta-equiv CSP here is a fallback; the authoritative CSP is the
      Content-Security-Policy response header set by the server.
    -->
    <meta http-equiv="Content-Security-Policy" content="
            default-src   'none';
            style-src     'self' https://fonts.googleapis.com;
            font-src      https://fonts.gstatic.com;
            script-src    'nonce-{{ csp_nonce }}';
            connect-src   'self';
            img-src       'self' data:;
            base-uri      'none';
            form-action   'self';
            frame-ancestors 'none';
          " style="box-sizing:border-box; margin:0; padding:0" />
    <meta http-equiv="X-Frame-Options" content="DENY" style="box-sizing:border-box; margin:0; padding:0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" style="box-sizing:border-box; margin:0; padding:0" />
    <meta name="referrer" content="no-referrer" style="box-sizing:border-box; margin:0; padding:0" />
    <!-- Opt out of FLoC / Topics API -->
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()" style="box-sizing:border-box; margin:0; padding:0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" style="box-sizing:border-box; margin:0; padding:0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" style="box-sizing:border-box; margin:0; padding:0" />

                    <li class="req" id="req-lower" style="box-sizing:border-box; margin:0; padding:0; display:flex; align-items:center; gap:.35rem; font-size:.78rem; color:#64748B">  <span class="dot" aria-hidden="true" style="box-sizing:border-box; margin:0; padding:0; width:7px; height:7px; border-radius:50%; background:#E2E8F0; flex-shrink:0"></span>Lowercase letter</li>

                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" id="eye-confirm-open" style="box-sizing:border-box; margin:0; padding:0; width:18px; height:18px; pointer-events:none; display:block">

</div>

<script nonce="{{ csp_nonce }}" style="box-sizing:border-box; margin:0; padding:0">
(function () {
    'use strict';

    /* ── TOKEN: extract once, immediately strip from URL ─────────────────
       Prevents the token appearing in:
         • browser history  • server access logs  • Referer headers        */
    const _rawToken = new URLSearchParams(location.search).get('token') || '';

    /*
               A valid token is base64url / hex, 32–512 chars.
               Anything else is rejected without hitting the server.       */
    const TOKEN_RE = /^[A-Za-z0-9\-_+/=]{32,512}$/;
    const TOKEN    = TOKEN_RE.test(_rawToken) ? _rawToken : '';

    /* Strip the query string regardless (even if token is invalid) */
    if (location.search) {
        history.replaceState(null, '', location.pathname);
    }

    /* ── Early abort: missing or malformed token ─────────────────────── */
    if (!TOKEN) {
        _renderFatalError(
            'This password-reset link is missing, invalid, or has already been used. ' +
            'Please request a new one.'
        );
        return; /* halt all further execution */
    }

    /* ── DOM refs (gathered once at boot) ───────────────────────────────*/
    const $            = id => document.getElementById(id);
    const newInp       = $('new_password');
    const confInp      = $('confirm_password');
    const submitBtn    = $('submit-btn');
    const matchHint    = $('match-hint');
    const lockoutEl    = $('lockout-banner');
    const msgEl        = $('message');
    const strengthWrap = $('strength-wrap');
    const strLabel     = $('strength-label');

    /* ──
       5 attempts → 5-minute client lockout.
       sessionStorage survives page refresh but not tab close,
       providing reasonable brute-force friction without tracking users.   */
    const RATE_KEY = 'pp_rp_rl';
    const RATE_CFG = { max: 5, windowMs: 5 * 60 * 1000 };
    let   _lockoutTimer = null;

    function _loadRate() {
        try {
            const v = sessionStorage.getItem(RATE_KEY);
            if (v) return JSON.parse(v);
        } catch (_) {}
        return { attempts: 0, lockedUntil: 0 };
    }
    function _saveRate(r) {
        try { sessionStorage.setItem(RATE_KEY, JSON.stringify(r)); } catch (_) {}
    }
    function isLockedOut() { return Date.now() < _loadRate().lockedUntil; }

    function recordAttempt() {
        const r = _loadRate();
        r.attempts++;
        if (r.attempts >= RATE_CFG.max) {
            r.lockedUntil = Date.now() + RATE_CFG.windowMs;
            r.attempts    = 0;
        }
        _saveRate(r);
    }

    function activateLockout() {
        submitBtn.disabled = true;
        _refreshLockoutBanner();
        if (_lockoutTimer) clearInterval(_lockoutTimer);
        _lockoutTimer = setInterval(function () {
            if (!isLockedOut()) {
                clearInterval(_lockoutTimer);
                _lockoutTimer = null;
                lockoutEl.style.display = 'none';
                lockoutEl.textContent   = '';
                updateBtn();
            } else {
                _refreshLockoutBanner();
            }
        }, 10_000);
    }

    function _refreshLockoutBanner() {
        const secsLeft = Math.max(0, Math.ceil((_loadRate().lockedUntil - Date.now()) / 1000));
        const mins     = Math.ceil(secsLeft / 60);
        lockoutEl.textContent   = 'Too many attempts. Please wait ' + mins + ' minute' + (mins !== 1 ? 's' : '') + ' before trying again.';
        lockoutEl.style.display = 'block';
    }

    /* ── CSRF cookie reader ──────────────────────────────────────────────
       Reads anti-CSRF token from a server-set cookie named "csrf_token".
       Adjust the regex to match your framework's cookie name.            */
    function getCsrfToken() {
        const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : '';
    }

    /* ── Password rules (mirror server-side validation exactly) ─────── */
    const RULES = {
        len:     function (p) { return p.length >= 8 && p.length <= 128; },
        upper:   function (p) { return /[A-Z]/.test(p); },
        lower:   function (p) { return /[a-z]/.test(p); },
        digit:   function (p) { return /[0-9]/.test(p); },
        special: function (p) { return /[^a-zA-Z0-9]/.test(p); },
    };

    function checkRules(p) {
        return {
            len:     RULES.len(p),
            upper:   RULES.upper(p),
            lower:   RULES.lower(p),
            digit:   RULES.digit(p),
            special: RULES.special(p),
        };
    }

    function allPassing(r) { return Object.values(r).every(Boolean); }

    function strengthScore(p) {
        var r = checkRules(p);
        return [r.len, r.upper || r.lower, r.digit, r.special].filter(Boolean).length;
    }

    /* ── Live password input ─────────────────────────────────────────── */
    function onPasswordInput() {
        var p = newInp.value;
        strengthWrap.style.display = p.length ? 'block' : 'none';

        var r = checkRules(p);
        _setReq('req-len',     r.len);
        _setReq('req-upper',   r.upper);
        _setReq('req-lower',   r.lower);
        _setReq('req-digit',   r.digit);
        _setReq('req-special', r.special);

        var score  = strengthScore(p);
        var labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        var cls    = ['', 'weak', 'fair', 'good', 'strong'];
        for (var i = 1; i <= 4; i++) {
            $('s' + i).className = i <= score ? cls[score] : '';
        }
        strLabel.textContent = p.length ? labels[score] : '';
        newInp.className     = !p.length ? '' : allPassing(r) ? 'valid' : 'invalid';

        onConfirmInput();
        updateBtn();
    }

    /* ── Live confirm input ──────────────────────────────────────────── */
    function onConfirmInput() {
        var p = newInp.value;
        var c = confInp.value;

        if (!c.length) {
            matchHint.textContent = ''; matchHint.className = 'match-hint'; confInp.className = '';
        } else if (p === c) {
            matchHint.textContent = '✓ Passwords match'; matchHint.className = 'match-hint ok'; confInp.className = 'valid';
        } else {
            matchHint.textContent = '✗ Passwords do not match'; matchHint.className = 'match-hint bad'; confInp.className = 'invalid';
        }
        updateBtn();
    }

    function _setReq(id, met) { $(id).classList.toggle('met', met); }

    function updateBtn() {
        if (isLockedOut()) { submitBtn.disabled = true; return; }
        var p = newInp.value;
        var c = confInp.value;
        submitBtn.disabled = !(allPassing(checkRules(p)) && p === c && p.length > 0);
    }

    /* ── Eye toggle ── */
    function toggleVis(inputId, openSvgId, slashSvgId, btn) {
        var inp      = $(inputId);
        var openSvg  = $(openSvgId);
        var slashSvg = $(slashSvgId);
        var showing  = inp.type === 'text';

        inp.type = showing ? 'password' : 'text';
        openSvg.classList.toggle('vis-hidden',  !showing);
        slashSvg.classList.toggle('vis-hidden', showing);
        btn.setAttribute('aria-label',   showing ? 'Show password' : 'Hide password');
        btn.setAttribute('aria-pressed', String(!showing));
    }

    /* ── Submit ─────────────────────────────────────────────────────── */
    async function submitReset() {
        if (isLockedOut()) { activateLockout(); return; }

        var newPassword     = newInp.value;
        var confirmPassword = confInp.value;
        wipeDomPasswords();

        /* Defence-in-depth validation (button should already block this) */
        if (!allPassing(checkRules(newPassword))) {
            showMessage('Password does not meet all requirements.', 'error'); return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('Passwords do not match.', 'error'); return;
        }

        recordAttempt();
        submitBtn.disabled    = true;
        submitBtn.textContent = 'Resetting\u2026';

        try {
            var headers = { 'Content-Type': 'application/json' };
            var csrf = getCsrfToken();
            if (csrf) headers['X-CSRF-Token'] = csrf;

            var res = await fetch('/api/v1/auth/reset-password', {
                method:      'POST',
                credentials: 'same-origin',
                headers:     headers,
                body:        JSON.stringify({ token: TOKEN, new_password: newPassword }),
            });

            /* Overwrite local variable (best-effort memory hygiene) */
            newPassword = null;
            confirmPassword = null;

            if (res.ok) {
                showMessage(
                    'If your link was valid, your password has been updated. You may now log in.',
                    'success'
                );
                submitBtn.style.display = 'none';

            } else if (res.status === 429) {
                var retryAfter = parseInt(res.headers.get('Retry-After') || '300', 10);
                var r = _loadRate();
                r.lockedUntil = Date.now() + retryAfter * 1000;
                _saveRate(r);
                activateLockout();
                showMessage('Too many attempts. Please wait before trying again.', 'error');

            } else {
                showMessage('This link is invalid or has expired. Please request a new one.', 'error');
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Reset Password';
            }

        } catch (_err) {
            newPassword = null;
            showMessage('A network error occurred. Please check your connection and try again.', 'error');
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Reset Password';
        }
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */

    function wipeDomPasswords() {
        if (newInp)  { newInp.value  = ''; newInp.className  = ''; }
        if (confInp) { confInp.value = ''; confInp.className = ''; }
        strengthWrap.style.display   = 'none';
        strLabel.textContent         = '';
        matchHint.textContent        = '';
        matchHint.className          = 'match-hint';
        for (var i = 1; i <= 4; i++) $('s' + i).className = '';
        ['req-len','req-upper','req-lower','req-digit','req-special'].forEach(function (id) {
            $(id).classList.remove('met');
        });
    }

    /* showMessage: always textContent — never innerHTML */
    function showMessage(text, type) {
        msgEl.textContent   = (typeof text === 'string') ? text.slice(0, 300) : 'An error occurred.';
        msgEl.className     = 'message ' + (type === 'success' ? 'success' : 'error');
        msgEl.style.display = 'block';
    }

    /*
       Creates text nodes only; completely immune to XSS injection.        */
    function _renderFatalError(msg) {
        var body = document.querySelector('.card-body');
        if (!body) return;
        while (body.firstChild) body.removeChild(body.firstChild);
        var div           = document.createElement('div');
        div.className     = 'message error';
        div.style.cssText = 'display:block;margin:0';
        div.textContent   = msg;
        body.appendChild(div);
    }

    /* ── Wire all event listeners ────────────────────────────────────────
                All interactions handled via addEventListener.             */
    newInp.addEventListener('input', onPasswordInput);
    confInp.addEventListener('input', onConfirmInput);

    $('toggle-new').addEventListener('click', function () {
        toggleVis('new_password', 'eye-new-open', 'eye-new-slash', this);
    });
    $('toggle-confirm').addEventListener('click', function () {
        toggleVis('confirm_password', 'eye-confirm-open', 'eye-confirm-slash', this);
    });

    $('reset-form').addEventListener('submit', function (e) {
        e.preventDefault();
        submitReset();
    });

    /* ── On load: honour any existing session lockout ─────────────────── */
    if (isLockedOut()) {
        activateLockout();
    }

})();
</script>
</body>
</html>
