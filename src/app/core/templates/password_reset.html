<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password · PawsPort</title>

    <!--
      Security headers are also set at the HTTP layer in the FastAPI route.
      The meta-equiv CSP here is a fallback; the authoritative CSP is the
      Content-Security-Policy response header set by the server.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src   'none';
            style-src     'self' https://fonts.googleapis.com;
            font-src      https://fonts.gstatic.com;
            script-src    'nonce-{{ csp_nonce }}';
            connect-src   'self';
            img-src       'self' data:;
            base-uri      'none';
            form-action   'self';
            frame-ancestors 'none';
          " />
    <meta http-equiv="X-Frame-Options"        content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer"                     content="no-referrer" />
    <!-- Opt out of FLoC / Topics API -->
    <meta http-equiv="Permissions-Policy"     content="interest-cohort=()" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary:        #FF6B35;
            --primary-dark:   #E85A28;
            --text-primary:   #1E293B;
            --text-secondary: #64748B;
            --border:         #E2E8F0;
            --radius-lg:      24px;
            --green:          #10B981;
            --red:            #EF4444;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* Respect prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,107,53,.08) 0%, transparent 70%);
            animation: pulse 15s ease-in-out infinite; pointer-events: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: .3; transform: scale(1); }
            50%      { opacity: .6; transform: scale(1.1); }
        }

        .card {
            background: #fff; border-radius: var(--radius-lg);
            box-shadow: 0 25px 60px -15px rgba(0,0,0,.4);
            overflow: hidden; width: 100%; max-width: 440px;
            animation: fadeIn .6s ease-out;
            transition: transform .3s ease, box-shadow .3s ease;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 30px 70px -20px rgba(0,0,0,.45); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 28px 32px; color: white; position: relative; overflow: hidden;
        }
        .card-header::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.03) 10px,rgba(255,255,255,.03) 20px);
            animation: slide 3s linear infinite; z-index: 0;
        }
        .card-header::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 85% 20%, rgba(255,255,255,.18), transparent 55%);
            z-index: 0;
        }
        @keyframes slide { 0% { transform: translate(0,0); } 100% { transform: translate(20px,20px); } }

        .header-logo { display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; margin-bottom: 12px; }
        .header-logo svg  { width: 28px; height: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
        .header-logo span { font-weight: 800; font-size: 1.1rem; letter-spacing: .06em; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
        .card-header h1   { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,.15); }
        .card-header p    { font-size: .92rem; opacity: .85; margin-top: 4px; position: relative; z-index: 1; }

        .card-body { padding: 1.75rem 2rem 2rem; }
        .field     { margin-bottom: 1rem; }

        label {
            display: block; font-size: .8rem; font-weight: 600;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: .05em; margin-bottom: .4rem;
        }

        .input-wrap { position: relative; }
        .input-wrap input {
            width: 100%; padding: .7rem 2.75rem .7rem 1rem;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: .975rem; font-family: inherit;
            color: var(--text-primary); background: #FAFAFA;
            outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .input-wrap input:focus         { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(255,107,53,.1); }
        .input-wrap input:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .input-wrap input.valid         { border-color: var(--green); }
        .input-wrap input.invalid       { border-color: var(--red); }

        .toggle-eye {
            position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 4px;
            color: var(--text-secondary); display: flex; align-items: center;
            transition: color .15s; border-radius: 4px;
        }
        .toggle-eye:hover         { color: var(--primary); }
        .toggle-eye:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .toggle-eye svg           { width: 18px; height: 18px; pointer-events: none; display: block; }

        .strength-wrap { margin-top: .45rem; display: none; }
        .strength-bar  { display: flex; gap: 4px; margin-bottom: .3rem; }
        .strength-bar span { flex: 1; height: 4px; border-radius: 99px; background: var(--border); transition: background .3s; }
        .strength-bar span.weak   { background: #EF4444; }
        .strength-bar span.fair   { background: #F59E0B; }
        .strength-bar span.good   { background: #3B82F6; }
        .strength-bar span.strong { background: var(--green); }
        .strength-label { font-size: .75rem; font-weight: 600; color: var(--text-secondary); }

        .requirements { list-style: none; margin: .6rem 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: .25rem .5rem; padding: 0; }
        .req { display: flex; align-items: center; gap: .35rem; font-size: .78rem; color: var(--text-secondary); transition: color .2s; }
        .req.met      { color: var(--green); }
        .req .dot     { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .2s; }
        .req.met .dot { background: var(--green); }

        .match-hint     { font-size: .75rem; font-weight: 500; margin-top: .3rem; min-height: 1em; }
        .match-hint.ok  { color: var(--green); }
        .match-hint.bad { color: var(--red); }

        .submit-btn {
            width: 100%; margin-top: .75rem; padding: .82rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; border: none; border-radius: 10px;
            font-size: .975rem; font-weight: 700; font-family: inherit;
            cursor: pointer; letter-spacing: .02em;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 14px rgba(255,107,53,.3);
        }
        .submit-btn:hover:not(:disabled)  { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,53,.4); }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled              { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
        .submit-btn:focus-visible         { outline: 2px solid var(--primary); outline-offset: 3px; }

        .lockout-banner {
            background: #fef2f2; color: #991b1b;
            border: 1px solid #fca5a5; border-radius: 10px;
            padding: .65rem 1rem; font-size: .82rem; font-weight: 500;
            margin-bottom: .75rem; display: none;
        }
        .message { margin-top: 1rem; padding: .75rem 1rem; border-radius: 10px; font-size: .875rem; font-weight: 500; display: none; line-height: 1.45; }
        .message.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .message.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

        /* SVG visibility toggle — avoids unsafe-inline style attr */
        .vis-hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="header-logo">
            <svg viewBox="0 0 24 24" fill="white" aria-hidden="true" focusable="false">
                <path d="M12 2C13.6569 2 15 3.34315 15 5C15 6.65685 13.6569 8 12 8C10.3431 8 9 6.65685 9 5C9 3.34315 10.3431 2 12 2ZM6.5 6C8.433 6 10 7.567 10 9.5C10 11.433 8.433 13 6.5 13C4.567 13 3 11.433 3 9.5C3 7.567 4.567 6 6.5 6ZM17.5 6C19.433 6 21 7.567 21 9.5C21 11.433 19.433 13 17.5 13C15.567 13 14 11.433 14 9.5C14 7.567 15.567 6 17.5 6ZM12 10C15.3137 10 18 12.6863 18 16V18H6V16C6 12.6863 8.68629 10 12 10Z"/>
            </svg>
            <span>PawsPort</span>
        </div>
        <h1>Reset your password</h1>
        <p>Enter a new password for your account.</p>
    </div>

    <div class="card-body">
        <div class="lockout-banner" id="lockout-banner" role="alert" aria-live="assertive"></div>

        <!--
                  • Enter key submits (expected UX / accessibility)
                  • Password managers correctly identify new-password context
                  • action="javascript:void(0)" prevents any GET fallback
                  • submit event handled via addEventListener (no onclick)
        -->
        <form id="reset-form" action="javascript:void(0)" novalidate autocomplete="on">

            <div class="field">
                <label for="new_password">New Password</label>
                <div class="input-wrap">
                    <!--
                               prevents browser sending password text to a
                               third-party spell-check service.
                               aria-describedby links input to requirements
                               list and strength label for screen readers.
                    -->
                    <input
                        type="password"
                        id="new_password"
                        name="new-password"
                        autocomplete="new-password"
                        spellcheck="false"
                        autocorrect="off"
                        autocapitalize="off"
                        placeholder="Enter new password"
                        maxlength="128"
                        aria-required="true"
                        aria-describedby="req-list strength-label"
                    />
                    <!--
                               via display style — zero innerHTML anywhere.
                    -->
                    <button type="button" class="toggle-eye" id="toggle-new"
                            aria-label="Show password" aria-controls="new_password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true" focusable="false" id="eye-new-open">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true" focusable="false" id="eye-new-slash" class="vis-hidden">
                            <line x1="1" y1="1" x2="23" y2="23"/>
                            <path d="M10.94 6.08A6 6 0 0 1 12 6c7 0 11 6 11 6a18.78 18.78 0 0 1-3.89 4.37M9.88 9.88a3 3 0 1 0 4.24 4.24M9.9 4.24A9.12 9.12 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 8.77-6"/>
                        </svg>
                    </button>
                </div>

                <div class="strength-wrap" id="strength-wrap" aria-hidden="true">
                    <div class="strength-bar">
                        <span id="s1"></span><span id="s2"></span>
                        <span id="s3"></span><span id="s4"></span>
                    </div>
                    <div class="strength-label" id="strength-label"></div>
                </div>

                <ul class="requirements" id="req-list" aria-label="Password requirements">
                    <li class="req" id="req-len">    <span class="dot" aria-hidden="true"></span>8–128 characters</li>
                    <li class="req" id="req-upper">  <span class="dot" aria-hidden="true"></span>Uppercase letter</li>
                    <li class="req" id="req-lower">  <span class="dot" aria-hidden="true"></span>Lowercase letter</li>
                    <li class="req" id="req-digit">  <span class="dot" aria-hidden="true"></span>Number</li>
                    <li class="req" id="req-special"><span class="dot" aria-hidden="true"></span>Special character</li>
                </ul>
            </div>

            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-wrap">
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm-password"
                        autocomplete="new-password"
                        spellcheck="false"
                        autocorrect="off"
                        autocapitalize="off"
                        placeholder="Confirm new password"
                        maxlength="128"
                        aria-required="true"
                        aria-describedby="match-hint"
                    />
                    <button type="button" class="toggle-eye" id="toggle-confirm"
                            aria-label="Show password" aria-controls="confirm_password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true" focusable="false" id="eye-confirm-open">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true" focusable="false" id="eye-confirm-slash" class="vis-hidden">
                            <line x1="1" y1="1" x2="23" y2="23"/>
                            <path d="M10.94 6.08A6 6 0 0 1 12 6c7 0 11 6 11 6a18.78 18.78 0 0 1-3.89 4.37M9.88 9.88a3 3 0 1 0 4.24 4.24M9.9 4.24A9.12 9.12 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 8.77-6"/>
                        </svg>
                    </button>
                </div>
                <div class="match-hint" id="match-hint" aria-live="polite" aria-atomic="true"></div>
            </div>

            <button class="submit-btn" id="submit-btn" type="submit" disabled>
                Reset Password
            </button>

        </form>

        <div class="message" id="message" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
(function () {
    'use strict';

    /* ── TOKEN: extract once, immediately strip from URL ─────────────────
       Prevents the token appearing in:
         • browser history  • server access logs  • Referer headers        */
    const _rawToken = new URLSearchParams(location.search).get('token') || '';

    /*
               A valid token is base64url / hex, 32–512 chars.
               Anything else is rejected without hitting the server.       */
    const TOKEN_RE = /^[A-Za-z0-9\-_+/=]{32,512}$/;
    const TOKEN    = TOKEN_RE.test(_rawToken) ? _rawToken : '';

    /* Strip the query string regardless (even if token is invalid) */
    if (location.search) {
        history.replaceState(null, '', location.pathname);
    }

    /* ── Early abort: missing or malformed token ─────────────────────── */
    if (!TOKEN) {
        _renderFatalError(
            'This password-reset link is missing, invalid, or has already been used. ' +
            'Please request a new one.'
        );
        return; /* halt all further execution */
    }

    /* ── DOM refs (gathered once at boot) ───────────────────────────────*/
    const $            = id => document.getElementById(id);
    const newInp       = $('new_password');
    const confInp      = $('confirm_password');
    const submitBtn    = $('submit-btn');
    const matchHint    = $('match-hint');
    const lockoutEl    = $('lockout-banner');
    const msgEl        = $('message');
    const strengthWrap = $('strength-wrap');
    const strLabel     = $('strength-label');

    /* ──
       5 attempts → 5-minute client lockout.
       sessionStorage survives page refresh but not tab close,
       providing reasonable brute-force friction without tracking users.   */
    const RATE_KEY = 'pp_rp_rl';
    const RATE_CFG = { max: 5, windowMs: 5 * 60 * 1000 };
    let   _lockoutTimer = null;

    function _loadRate() {
        try {
            const v = sessionStorage.getItem(RATE_KEY);
            if (v) return JSON.parse(v);
        } catch (_) {}
        return { attempts: 0, lockedUntil: 0 };
    }
    function _saveRate(r) {
        try { sessionStorage.setItem(RATE_KEY, JSON.stringify(r)); } catch (_) {}
    }
    function isLockedOut() { return Date.now() < _loadRate().lockedUntil; }

    function recordAttempt() {
        const r = _loadRate();
        r.attempts++;
        if (r.attempts >= RATE_CFG.max) {
            r.lockedUntil = Date.now() + RATE_CFG.windowMs;
            r.attempts    = 0;
        }
        _saveRate(r);
    }

    function activateLockout() {
        submitBtn.disabled = true;
        _refreshLockoutBanner();
        if (_lockoutTimer) clearInterval(_lockoutTimer);
        _lockoutTimer = setInterval(function () {
            if (!isLockedOut()) {
                clearInterval(_lockoutTimer);
                _lockoutTimer = null;
                lockoutEl.style.display = 'none';
                lockoutEl.textContent   = '';
                updateBtn();
            } else {
                _refreshLockoutBanner();
            }
        }, 10_000);
    }

    function _refreshLockoutBanner() {
        const secsLeft = Math.max(0, Math.ceil((_loadRate().lockedUntil - Date.now()) / 1000));
        const mins     = Math.ceil(secsLeft / 60);
        lockoutEl.textContent   = 'Too many attempts. Please wait ' + mins + ' minute' + (mins !== 1 ? 's' : '') + ' before trying again.';
        lockoutEl.style.display = 'block';
    }

    /* ── CSRF cookie reader ──────────────────────────────────────────────
       Reads anti-CSRF token from a server-set cookie named "csrf_token".
       Adjust the regex to match your framework's cookie name.            */
    function getCsrfToken() {
        const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : '';
    }

    /* ── Password rules (mirror server-side validation exactly) ─────── */
    const RULES = {
        len:     function (p) { return p.length >= 8 && p.length <= 128; },
        upper:   function (p) { return /[A-Z]/.test(p); },
        lower:   function (p) { return /[a-z]/.test(p); },
        digit:   function (p) { return /[0-9]/.test(p); },
        special: function (p) { return /[^a-zA-Z0-9]/.test(p); },
    };

    function checkRules(p) {
        return {
            len:     RULES.len(p),
            upper:   RULES.upper(p),
            lower:   RULES.lower(p),
            digit:   RULES.digit(p),
            special: RULES.special(p),
        };
    }

    function allPassing(r) { return Object.values(r).every(Boolean); }

    function strengthScore(p) {
        var r = checkRules(p);
        return [r.len, r.upper || r.lower, r.digit, r.special].filter(Boolean).length;
    }

    /* ── Live password input ─────────────────────────────────────────── */
    function onPasswordInput() {
        var p = newInp.value;
        strengthWrap.style.display = p.length ? 'block' : 'none';

        var r = checkRules(p);
        _setReq('req-len',     r.len);
        _setReq('req-upper',   r.upper);
        _setReq('req-lower',   r.lower);
        _setReq('req-digit',   r.digit);
        _setReq('req-special', r.special);

        var score  = strengthScore(p);
        var labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        var cls    = ['', 'weak', 'fair', 'good', 'strong'];
        for (var i = 1; i <= 4; i++) {
            $('s' + i).className = i <= score ? cls[score] : '';
        }
        strLabel.textContent = p.length ? labels[score] : '';
        newInp.className     = !p.length ? '' : allPassing(r) ? 'valid' : 'invalid';

        onConfirmInput();
        updateBtn();
    }

    /* ── Live confirm input ──────────────────────────────────────────── */
    function onConfirmInput() {
        var p = newInp.value;
        var c = confInp.value;

        if (!c.length) {
            matchHint.textContent = ''; matchHint.className = 'match-hint'; confInp.className = '';
        } else if (p === c) {
            matchHint.textContent = '✓ Passwords match'; matchHint.className = 'match-hint ok'; confInp.className = 'valid';
        } else {
            matchHint.textContent = '✗ Passwords do not match'; matchHint.className = 'match-hint bad'; confInp.className = 'invalid';
        }
        updateBtn();
    }

    function _setReq(id, met) { $(id).classList.toggle('met', met); }

    function updateBtn() {
        if (isLockedOut()) { submitBtn.disabled = true; return; }
        var p = newInp.value;
        var c = confInp.value;
        submitBtn.disabled = !(allPassing(checkRules(p)) && p === c && p.length > 0);
    }

    /* ── Eye toggle ── */
    function toggleVis(inputId, openSvgId, slashSvgId, btn) {
        var inp      = $(inputId);
        var openSvg  = $(openSvgId);
        var slashSvg = $(slashSvgId);
        var showing  = inp.type === 'text';

        inp.type = showing ? 'password' : 'text';
        openSvg.classList.toggle('vis-hidden',  !showing);
        slashSvg.classList.toggle('vis-hidden', showing);
        btn.setAttribute('aria-label',   showing ? 'Show password' : 'Hide password');
        btn.setAttribute('aria-pressed', String(!showing));
    }

    /* ── Submit ─────────────────────────────────────────────────────── */
    async function submitReset() {
        if (isLockedOut()) { activateLockout(); return; }

        var newPassword     = newInp.value;
        var confirmPassword = confInp.value;
        wipeDomPasswords();

        /* Defence-in-depth validation (button should already block this) */
        if (!allPassing(checkRules(newPassword))) {
            showMessage('Password does not meet all requirements.', 'error'); return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('Passwords do not match.', 'error'); return;
        }

        recordAttempt();
        submitBtn.disabled    = true;
        submitBtn.textContent = 'Resetting\u2026';

        try {
            var headers = { 'Content-Type': 'application/json' };
            var csrf = getCsrfToken();
            if (csrf) headers['X-CSRF-Token'] = csrf;

            var res = await fetch('/api/v1/auth/reset-password', {
                method:      'POST',
                credentials: 'same-origin',
                headers:     headers,
                body:        JSON.stringify({ token: TOKEN, new_password: newPassword }),
            });

            /* Overwrite local variable (best-effort memory hygiene) */
            newPassword = null;
            confirmPassword = null;

            if (res.ok) {
                showMessage(
                    'If your link was valid, your password has been updated. You may now log in.',
                    'success'
                );
                submitBtn.style.display = 'none';

            } else if (res.status === 429) {
                var retryAfter = parseInt(res.headers.get('Retry-After') || '300', 10);
                var r = _loadRate();
                r.lockedUntil = Date.now() + retryAfter * 1000;
                _saveRate(r);
                activateLockout();
                showMessage('Too many attempts. Please wait before trying again.', 'error');

            } else {
                showMessage('This link is invalid or has expired. Please request a new one.', 'error');
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Reset Password';
            }

        } catch (_err) {
            newPassword = null;
            showMessage('A network error occurred. Please check your connection and try again.', 'error');
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Reset Password';
        }
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */

    function wipeDomPasswords() {
        if (newInp)  { newInp.value  = ''; newInp.className  = ''; }
        if (confInp) { confInp.value = ''; confInp.className = ''; }
        strengthWrap.style.display   = 'none';
        strLabel.textContent         = '';
        matchHint.textContent        = '';
        matchHint.className          = 'match-hint';
        for (var i = 1; i <= 4; i++) $('s' + i).className = '';
        ['req-len','req-upper','req-lower','req-digit','req-special'].forEach(function (id) {
            $(id).classList.remove('met');
        });
    }

    /* showMessage: always textContent — never innerHTML */
    function showMessage(text, type) {
        msgEl.textContent   = (typeof text === 'string') ? text.slice(0, 300) : 'An error occurred.';
        msgEl.className     = 'message ' + (type === 'success' ? 'success' : 'error');
        msgEl.style.display = 'block';
    }

    /*
       Creates text nodes only; completely immune to XSS injection.        */
    function _renderFatalError(msg) {
        var body = document.querySelector('.card-body');
        if (!body) return;
        while (body.firstChild) body.removeChild(body.firstChild);
        var div           = document.createElement('div');
        div.className     = 'message error';
        div.style.cssText = 'display:block;margin:0';
        div.textContent   = msg;
        body.appendChild(div);
    }

    /* ── Wire all event listeners ────────────────────────────────────────
                All interactions handled via addEventListener.             */
    newInp.addEventListener('input', onPasswordInput);
    confInp.addEventListener('input', onConfirmInput);

    $('toggle-new').addEventListener('click', function () {
        toggleVis('new_password', 'eye-new-open', 'eye-new-slash', this);
    });
    $('toggle-confirm').addEventListener('click', function () {
        toggleVis('confirm_password', 'eye-confirm-open', 'eye-confirm-slash', this);
    });

    $('reset-form').addEventListener('submit', function (e) {
        e.preventDefault();
        submitReset();
    });

    /* ── On load: honour any existing session lockout ─────────────────── */
    if (isLockedOut()) {
        activateLockout();
    }

})();
</script>
</body>
</html>
