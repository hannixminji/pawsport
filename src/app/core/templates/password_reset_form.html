<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password · PawsPort</title>

    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style nonce="{{ csp_nonce }}">
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }

        /* card */
        .card {

            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 60px -15px rgba(0,0,0,.5);
            overflow: hidden;
            width: 100%; max-width: 440px;
            animation: cardIn .45s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1);   }
        }

        /* header — identical to other templates */
        .card-header {
            background: linear-gradient(135deg, #FF6B35 0%, #E85A28 100%);
            padding: 28px 32px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .card-header .stripe {
            display: block; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.04) 10px, rgba(255,255,255,.04) 20px);
            pointer-events: none; z-index: 0;
        }
        .card-header .glow {
            display: block; position: absolute; inset: 0;
            background: radial-gradient(circle at 85% 20%, rgba(255,255,255,.18), transparent 55%);
            pointer-events: none; z-index: 0;
        }
        .header-logo {
            display: flex; align-items: center; gap: 10px;
 margin-bottom: 12px;
        }
        .header-logo img  { width: 28px; height: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
        .header-logo span { font-weight: 800; font-size: 1.1rem; letter-spacing: .06em; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
        .card-header h1   { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,.15); }
        .card-header p    { font-size: .92rem; opacity: .85; margin-top: 4px; position: relative; z-index: 1; }

        /* body */
        .card-body { padding: 2rem; }

        .lockout-banner {
            display: none;
            padding: .65rem 1rem;
            background: #fef2f2; color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 10px;
            font-size: .82rem; font-weight: 500;
            margin-bottom: .75rem;
        }

        /* fields */
        .field { margin-bottom: 1.1rem; }

        label {
            display: block;
            font-size: .78rem; font-weight: 700;
            color: #64748B;
            text-transform: uppercase; letter-spacing: .06em;
            margin-bottom: .45rem;
            transition: color .2s;
        }
        .field:focus-within label { color: #FF6B35; }

        .input-wrap { position: relative; }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: .75rem 2.75rem .75rem 1rem;
            border: 1.5px solid #CBD5E1;
            border-radius: 10px;
            font-size: .975rem; font-family: inherit;
            color: #1E293B;
            background: #FAFAFA;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        input::placeholder { color: #CBD5E1; }
        input:focus {
            border-color: #FF6B35;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255,107,53,.12);
        }
        input.valid {
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16,185,129,.1);
        }
        input.invalid {
            border-color: #EF4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,.1);
            animation: shake .35s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90%  { transform: translateX(-1px); }
            20%, 80%  { transform: translateX(2px);  }
            30%, 50%, 70% { transform: translateX(-3px); }
            40%, 60%  { transform: translateX(3px);  }
        }

        /* eye toggle */
        .toggle-eye {
            position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #CBD5E1; padding: 4px;
            display: flex; align-items: center; border-radius: 6px;
            transition: color .15s;
        }
        .toggle-eye:hover { color: #FF6B35; }
        .toggle-eye svg { width: 18px; height: 18px; pointer-events: none; }

        /* strength bar */
        .strength-wrap {
            margin-top: .5rem;
            display: none;
            animation: fadeIn .2s ease both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .strength-bar { display: flex; gap: 4px; margin-bottom: .3rem; }
        .strength-bar span {
            flex: 1; height: 4px; border-radius: 99px;
            background: #E2E8F0;
            transition: background .3s, transform .3s;
            transform-origin: left;
        }
        .strength-bar span.weak   { background: #EF4444; }
        .strength-bar span.fair   { background: #F59E0B; }
        .strength-bar span.good   { background: #3B82F6; }
        .strength-bar span.strong { background: #10B981; }
        #strength-label { font-size: .75rem; font-weight: 600; color: #64748B; }

        /* requirements */
        .requirements {
            list-style: none;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: .3rem .5rem;
            margin-top: .65rem;
            background: #F8FAFC;
            border: 1.5px solid #CBD5E1;
            border-radius: 10px;
            padding: .75rem 1rem;
            transition: border-color .2s;
        }
        .req {
            display: flex; align-items: center; gap: .4rem;
            font-size: .78rem; color: #94A3B8;
            transition: color .2s;
        }
        .req-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
            background: #E2E8F0;
            transition: background .25s, transform .25s, box-shadow .25s;
        }
        .req.met { color: #10B981; }
        .req.met .req-dot {
            background: #10B981;
            transform: scale(1.3);
            box-shadow: 0 0 6px rgba(16,185,129,.5);
        }

        /* match hint */
        .match-hint {
            font-size: .76rem; font-weight: 500;
            margin-top: .35rem; min-height: 1.1em;
            color: #94A3B8;
            transition: color .2s;
        }
        .match-hint.ok  { color: #10B981; }
        .match-hint.bad { color: #EF4444; }

        /* submit */
        .submit-btn {
            width: 100%; margin-top: .75rem;
            padding: .85rem;
            background: linear-gradient(135deg, #FF6B35 0%, #E85A28 100%);
            color: #fff; border: none; border-radius: 10px;
            font-size: .975rem; font-weight: 700; font-family: inherit;
            cursor: pointer; letter-spacing: .02em;
            box-shadow: 0 4px 14px rgba(255,107,53,.3);
            transition: opacity .2s, transform .15s, box-shadow .2s;
            position: relative; overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
            pointer-events: none;
        }
        .submit-btn:not(:disabled):hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255,107,53,.4);
        }
        .submit-btn:not(:disabled):active { transform: translateY(0); }
        .submit-btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

        /* message */
        .message {
            display: none;
            padding: .85rem 1rem;
            margin-top: 1rem;
            border-radius: 10px;
            font-size: .875rem; font-weight: 500; line-height: 1.5;
            animation: fadeIn .25s ease both;
        }
        .message.success { background: #F0FDF4; border: 1.5px solid #86EFAC; color: #166534; }
        .message.error   { background: #FEF2F2; border: 1.5px solid #FECACA; color: #991B1B; }

        /* footer */
        .card-footer {
            background: #FAFAFA;
            border-top: 1px solid #E2E8F0;
            padding: 1.25rem 2rem;
            text-align: center;
        }
        .card-footer p { font-size: .75rem; color: #64748B; opacity: .6; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <span class="stripe" aria-hidden="true"></span>
        <span class="glow"   aria-hidden="true"></span>
        <div class="header-logo">
            <img src="https://storage.googleapis.com/pawsport-thesis-static/images/logo.png" alt="PawsPort" />
            <span>PawsPort</span>
        </div>
        <h1>Reset your password</h1>
        <p>Enter a new password for your account.</p>
    </div>

    <div class="card-body">
        <div class="lockout-banner" id="lockout-banner" role="alert" aria-live="assertive"></div>

        <form id="reset-form" action="javascript:void(0)" novalidate autocomplete="on">

            <div class="field">
                <label for="new_password">New Password</label>
                <div class="input-wrap">
                    <input type="password" id="new_password" name="new-password"
                           autocomplete="new-password" spellcheck="false"
                           autocorrect="off" autocapitalize="off"
                           placeholder="Enter new password"
                           maxlength="128" aria-required="true"
                           aria-describedby="req-list strength-label" />
                    <button type="button" class="toggle-eye" id="toggle-new"
                            aria-label="Show password" aria-controls="new_password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" id="eye-new-open">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" id="eye-new-slash" style="display:none">
                            <line x1="1" y1="1" x2="23" y2="23"/>
                            <path d="M10.94 6.08A6 6 0 0 1 12 6c7 0 11 6 11 6a18.78 18.78 0 0 1-3.89 4.37M9.88 9.88a3 3 0 1 0 4.24 4.24M9.9 4.24A9.12 9.12 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 8.77-6"/>
                        </svg>
                    </button>
                </div>

                <div class="strength-wrap" id="strength-wrap" aria-hidden="true">
                    <div class="strength-bar">
                        <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
                    </div>
                    <div id="strength-label"></div>
                </div>

                <ul class="requirements" id="req-list" aria-label="Password requirements">
                    <li class="req" id="req-len"><span class="req-dot"></span>8–128 characters</li>
                    <li class="req" id="req-upper"><span class="req-dot"></span>Uppercase letter</li>
                    <li class="req" id="req-lower"><span class="req-dot"></span>Lowercase letter</li>
                    <li class="req" id="req-digit"><span class="req-dot"></span>Number</li>
                    <li class="req" id="req-special"><span class="req-dot"></span>Special character</li>
                </ul>
            </div>

            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirm_password" name="confirm-password"
                           autocomplete="new-password" spellcheck="false"
                           autocorrect="off" autocapitalize="off"
                           placeholder="Confirm new password"
                           maxlength="128" aria-required="true"
                           aria-describedby="match-hint" />
                    <button type="button" class="toggle-eye" id="toggle-confirm"
                            aria-label="Show password" aria-controls="confirm_password" aria-pressed="false">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" id="eye-confirm-open">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" id="eye-confirm-slash" style="display:none">
                            <line x1="1" y1="1" x2="23" y2="23"/>
                            <path d="M10.94 6.08A6 6 0 0 1 12 6c7 0 11 6 11 6a18.78 18.78 0 0 1-3.89 4.37M9.88 9.88a3 3 0 1 0 4.24 4.24M9.9 4.24A9.12 9.12 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 8.77-6"/>
                        </svg>
                    </button>
                </div>
                <div class="match-hint" id="match-hint" aria-live="polite" aria-atomic="true"></div>
            </div>

            <button class="submit-btn" id="submit-btn" type="submit" disabled>Reset Password</button>

        </form>

        <div class="message" id="message" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </div>

    <div class="card-footer">
        <p>© 2026 PawsPort. All rights reserved.<br />Made with 🐾 for pet lovers.</p>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
(function () {
    'use strict';

    const _rawToken = new URLSearchParams(location.search).get('token') || '';
    const TOKEN_RE  = /^[A-Za-z0-9\-_+/=]{32,512}$/;
    const TOKEN     = TOKEN_RE.test(_rawToken) ? _rawToken : '';

    if (location.search) history.replaceState(null, '', location.pathname);

    if (!TOKEN) {
        _renderFatalError('This password-reset link is missing, invalid, or has already been used. Please request a new one.');
        return;
    }

    const $            = id => document.getElementById(id);
    const newInp       = $('new_password');
    const confInp      = $('confirm_password');
    const submitBtn    = $('submit-btn');
    const matchHint    = $('match-hint');
    const lockoutEl    = $('lockout-banner');
    const msgEl        = $('message');
    const strengthWrap = $('strength-wrap');
    const strLabel     = $('strength-label');

    const RATE_KEY = 'pp_rp_rl';
    const RATE_CFG = { max: 5, windowMs: 5 * 60 * 1000 };
    let _lockoutTimer = null;

    function _loadRate() {
        try { const v = sessionStorage.getItem(RATE_KEY); if (v) return JSON.parse(v); } catch (_) {}
        return { attempts: 0, lockedUntil: 0 };
    }
    function _saveRate(r) { try { sessionStorage.setItem(RATE_KEY, JSON.stringify(r)); } catch (_) {} }
    function isLockedOut() { return Date.now() < _loadRate().lockedUntil; }

    function recordAttempt() {
        const r = _loadRate();
        r.attempts++;
        if (r.attempts >= RATE_CFG.max) { r.lockedUntil = Date.now() + RATE_CFG.windowMs; r.attempts = 0; }
        _saveRate(r);
    }

    function activateLockout() {
        submitBtn.disabled = true;
        _refreshLockoutBanner();
        if (_lockoutTimer) clearInterval(_lockoutTimer);
        _lockoutTimer = setInterval(function () {
            if (!isLockedOut()) {
                clearInterval(_lockoutTimer); _lockoutTimer = null;
                lockoutEl.style.display = 'none'; lockoutEl.textContent = '';
                updateBtn();
            } else { _refreshLockoutBanner(); }
        }, 10_000);
    }

    function _refreshLockoutBanner() {
        const secsLeft = Math.max(0, Math.ceil((_loadRate().lockedUntil - Date.now()) / 1000));
        const mins = Math.ceil(secsLeft / 60);
        lockoutEl.textContent   = 'Too many attempts. Please wait ' + mins + ' minute' + (mins !== 1 ? 's' : '') + ' before trying again.';
        lockoutEl.style.display = 'block';
    }

    function getCsrfToken() {
        const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : '';
    }

    const RULES = {
        len:     p => p.length >= 8 && p.length <= 128,
        upper:   p => /[A-Z]/.test(p),
        lower:   p => /[a-z]/.test(p),
        digit:   p => /[0-9]/.test(p),
        special: p => /[^a-zA-Z0-9]/.test(p),
    };

    function checkRules(p) {
        return { len: RULES.len(p), upper: RULES.upper(p), lower: RULES.lower(p), digit: RULES.digit(p), special: RULES.special(p) };
    }
    function allPassing(r) { return Object.values(r).every(Boolean); }
    function strengthScore(p) {
        const r = checkRules(p);
        return [r.len, r.upper || r.lower, r.digit, r.special].filter(Boolean).length;
    }

    function onPasswordInput() {
        const p = newInp.value;
        strengthWrap.style.display = p.length ? 'block' : 'none';

        const r = checkRules(p);
        _setReq('req-len',     r.len);
        _setReq('req-upper',   r.upper);
        _setReq('req-lower',   r.lower);
        _setReq('req-digit',   r.digit);
        _setReq('req-special', r.special);

        const score  = strengthScore(p);
        const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        const cls    = ['', 'weak', 'fair', 'good', 'strong'];
        for (let i = 1; i <= 4; i++) $('s' + i).className = i <= score ? cls[score] : '';
        strLabel.textContent = p.length ? labels[score] : '';
        newInp.className     = !p.length ? '' : allPassing(r) ? 'valid' : 'invalid';

        onConfirmInput();
        updateBtn();
    }

    function onConfirmInput() {
        const p = newInp.value, c = confInp.value;
        if (!c.length) {
            matchHint.textContent = ''; matchHint.className = 'match-hint'; confInp.className = '';
        } else if (p === c) {
            matchHint.textContent = '✓ Passwords match'; matchHint.className = 'match-hint ok'; confInp.className = 'valid';
        } else {
            matchHint.textContent = '✗ Passwords do not match'; matchHint.className = 'match-hint bad'; confInp.className = 'invalid';
        }
        updateBtn();
    }

    function _setReq(id, met) { $(id).classList.toggle('met', met); }

    function updateBtn() {
        if (isLockedOut()) { submitBtn.disabled = true; return; }
        const p = newInp.value, c = confInp.value;
        submitBtn.disabled = !(allPassing(checkRules(p)) && p === c && p.length > 0);
    }

    function toggleVis(inputId, openId, slashId, btn) {
        const inp = $(inputId), showing = inp.type === 'text';
        inp.type = showing ? 'password' : 'text';
        $(openId).style.display  = showing ? 'block' : 'none';
        $(slashId).style.display = showing ? 'none'  : 'block';
        btn.setAttribute('aria-label',   showing ? 'Show password' : 'Hide password');
        btn.setAttribute('aria-pressed', String(!showing));
    }

    async function submitReset() {
        if (isLockedOut()) { activateLockout(); return; }

        let newPassword     = newInp.value;
        let confirmPassword = confInp.value;
        wipeDomPasswords();

        if (!allPassing(checkRules(newPassword))) { showMessage('Password does not meet all requirements.', 'error'); return; }
        if (newPassword !== confirmPassword)       { showMessage('Passwords do not match.', 'error'); return; }

        recordAttempt();
        submitBtn.disabled    = true;
        submitBtn.textContent = 'Resetting\u2026';

        try {
            const headers = { 'Content-Type': 'application/json' };
            const csrf = getCsrfToken();
            if (csrf) headers['X-CSRF-Token'] = csrf;

            const res = await fetch('/api/v1/auth/reset-password', {
                method: 'POST', credentials: 'same-origin',
                headers, body: JSON.stringify({ token: TOKEN, new_password: newPassword }),
            });

            newPassword = null; confirmPassword = null;

            if (res.ok) {
                showMessage('Your password has been updated. You may now log in.', 'success');
                submitBtn.style.display = 'none';
            } else if (res.status === 429) {
                const retryAfter = parseInt(res.headers.get('Retry-After') || '300', 10);
                const r = _loadRate();
                r.lockedUntil = Date.now() + retryAfter * 1000;
                _saveRate(r);
                activateLockout();
                showMessage('Too many attempts. Please wait before trying again.', 'error');
            } else {
                showMessage('This link is invalid or has expired. Please request a new one.', 'error');
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Reset Password';
            }
        } catch (_err) {
            newPassword = null;
            showMessage('A network error occurred. Please check your connection and try again.', 'error');
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Reset Password';
        }
    }

    function wipeDomPasswords() {
        if (newInp)  { newInp.value  = ''; newInp.className  = ''; }
        if (confInp) { confInp.value = ''; confInp.className = ''; }
        strengthWrap.style.display = 'none';
        strLabel.textContent       = '';
        matchHint.textContent      = '';
        matchHint.className        = 'match-hint';
        for (let i = 1; i <= 4; i++) $('s' + i).className = '';
        ['req-len','req-upper','req-lower','req-digit','req-special'].forEach(id => $(id).classList.remove('met'));
    }

    function showMessage(text, type) {
        msgEl.textContent   = (typeof text === 'string') ? text.slice(0, 300) : 'An error occurred.';
        msgEl.className     = 'message ' + (type === 'success' ? 'success' : 'error');
        msgEl.style.display = 'block';
    }

    function _renderFatalError(msg) {
        const body = document.querySelector('.card-body');
        if (!body) return;
        while (body.firstChild) body.removeChild(body.firstChild);
        const div = document.createElement('div');
        div.className     = 'message error';
        div.style.cssText = 'display:block;margin:0';
        div.textContent   = msg;
        body.appendChild(div);
    }

    newInp.addEventListener('input', onPasswordInput);
    confInp.addEventListener('input', onConfirmInput);
    $('toggle-new').addEventListener('click',     function () { toggleVis('new_password',     'eye-new-open',     'eye-new-slash',     this); });
    $('toggle-confirm').addEventListener('click', function () { toggleVis('confirm_password', 'eye-confirm-open', 'eye-confirm-slash', this); });
    $('reset-form').addEventListener('submit', function (e) { e.preventDefault(); submitReset(); });

    if (isLockedOut()) activateLockout();

})();
</script>

</body>
</html>
