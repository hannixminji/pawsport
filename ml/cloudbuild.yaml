steps:
  - name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - cp
      - gs://pawsport/ml-models/*.onnx
      - ./ai/models/

  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --tag=$_IMAGE
      - .

images:
  - $_IMAGE

options:
  logging: CLOUD_LOGGING_ONLY
