services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./src/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-service-account.json
    expose:
      - "8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app
      - ./src/.env:/code/.env
      - ./secrets/google-service-account.json:/secrets/google-service-account.json:ro

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: pawsport-ml
    ports:
      - "9000:9000"
    volumes:
      - ./ml:/app
      - ./secrets/google-service-account.json:/secrets/google-service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-service-account.json
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: arq app.core.worker.settings.WorkerSettings
    env_file:
      - ./src/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app
      - ./src/.env:/code/.env

  db:
    image: postgis/postgis:18-3.6-alpine
    env_file:
      - ./src/.env
    volumes:
      - postgres-data:/var/lib/postgresql
    expose:
      - "5432"

  redis:
    image: redis:8.4.0-alpine3.22
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  # -------- nginx reverse proxy --------
  nginx:
    image: nginx:1.29.4-alpine3.23
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  # -------- create first superuser --------
  create_superuser:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./src/.env
    depends_on:
      - db
      - web
    command: python -m src.scripts.create_first_superuser
    volumes:
      - ./src:/code/src

  # -------- run tests --------
  pytest:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./src/.env
    depends_on:
      - db
      - create_superuser
      - redis
    command: python -m pytest ./tests
    volumes:
      - .:/code

volumes:
  postgres-data:
  redis-data:
