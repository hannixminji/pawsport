services:
  api:
    container_name: api-service
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./src/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-service-account.json
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app
      - ./src/.env:/code/.env
      - ./secrets/google-service-account.json:/secrets/google-service-account.json:ro

  ml:
    container_name: ml-service
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./ml:/app
      - ./secrets/google-service-account.json:/secrets/google-service-account.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-service-account.json
    restart: unless-stopped

  worker:
    container_name: worker-service
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.core.worker.entry
    working_dir: /code
    env_file:
      - ./src/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-service-account.json
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app
      - ./src/.env:/code/.env
      - ./secrets/google-service-account.json:/secrets/google-service-account.json:ro

  db:
    container_name: postgis-db
    image: postgis/postgis:18-3.6-alpine
    env_file:
      - ./src/.env
    volumes:
      - postgres-data:/var/lib/postgresql
    expose:
      - "5432"

  redis:
    container_name: redis-cache
    image: redis:8.6.0-alpine3.23
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  create_superuser:
    container_name: create-superuser
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./src/.env
    depends_on:
      - db
      - api
    command: python -m src.scripts.create_first_superuser
    volumes:
      - ./src:/code/src

volumes:
  postgres-data:
  redis-data:
